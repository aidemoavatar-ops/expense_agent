metrics_to_run:
  - agent_turn_count

custom_metrics:
  - name: agent_turn_count
    custom_function: |
      def evaluate(instance):
          turns = (instance.get("agent_data") or {}).get("turns", [])
          return {'score': len(turns)}

  # Requires Vertex AI Agent Platform API enabled on the GCP project.
  # Run with: agents-cli eval grade --metrics custom_response_quality
  - name: custom_response_quality
    prompt_template: |
      You are an expense approval QA evaluator. Grade the agent response for
      an expense approval workflow on a scale of 1-5:
      1 (Poor): No decision reached or completely wrong outcome.
      2 (Below Average): Decision made but missing key fields or unclear summary.
      3 (Acceptable): Correct decision with basic output fields present.
      4 (Good): Correct decision, all fields present, clear summary line.
      5 (Excellent): Correct decision, all fields present, clear summary, appropriate method (auto vs human).

      User Prompt: {prompt}
      Final Response: {response}
      Full Agent Trace: {agent_data}

      Return a valid JSON object:
      {
        "score": <integer 1-5>,
        "explanation": "<rationale>"
      }
